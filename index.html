<!DOCTYPE html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sobotki Weddings | Timeless Photography & Film</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- GOOGLE FONTS (Fallback) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,800;1,400&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <!-- ADOBE FONTS -->
    <!-- WAŻNE: Skopiuj link ze swojego projektu Adobe Fonts i wklej go poniżej zamiast 'TWOJE_ID_PROJEKTU' -->
    <!-- Upewnij się, że w Adobe Fonts kliknąłeś "Publish" po dodaniu fonta do projektu -->
    <link rel="stylesheet" href="https://use.typekit.net/oiv8gfj.css">

    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: {
                paper: '#F3F2ED', // Warm bone/paper color
                black: '#1A1A1A', // Soft black
                gray: '#8C8C8C',
                lightGray: '#E5E5E5'
              }
            },
            fontFamily: {
              // Podium jako domyślny serif
              serif: ['"podium-sharp"', '"Podium Sharp"', 'Playfair Display', 'serif'],
              // Playfair jako osobna rodzina do wymuszania w italikach
              playfair: ['Playfair Display', 'serif'],
              sans: ['DM Sans', 'sans-serif'],
            },
            fontWeight: {
              'heavy': '1000', // Custom weight mapping to 1000
            },
            backgroundImage: {
              'noise': "url('https://grainy-gradients.vercel.app/noise.svg')",
            },
            animation: {
              marquee: 'marquee 60s linear infinite',
              'fade-in': 'fadeIn 1s ease-out forwards',
            },
            keyframes: {
              marquee: {
                '0%': { transform: 'translateX(0%)' },
                '100%': { transform: 'translateX(-50%)' },
              },
              fadeIn: {
                '0%': { opacity: '0', transform: 'translateY(10px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              }
            }
          }
        }
      }
    </script>
    <style>
      html.lenis, html.lenis body {
        height: auto;
      }
      
      .lenis.lenis-smooth {
        scroll-behavior: auto !important;
      }
      
      .lenis.lenis-smooth [data-lenis-prevent] {
        overscroll-behavior: contain;
      }
      
      .lenis.lenis-stopped {
        overflow: hidden;
      }
      
      .lenis.lenis-scrolling iframe {
        pointer-events: none;
      }

      body {
        background-color: #F3F2ED;
        color: #1A1A1A;
        overflow-x: hidden;
        min-height: 100vh;
      }

      /* Klasa pomocnicza wymuszająca Playfair Display w Italicu */
      .font-playfair-italic {
        font-family: 'Playfair Display', serif;
        font-style: italic;
      }

      /* Paper Texture Overlay - OPTIMIZED */
      .texture-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 9999;
        background-image: url('https://grainy-gradients.vercel.app/noise.svg');
        opacity: 0.03; 
        mix-blend-mode: multiply;
        /* PERFORMANCE HACK: Force GPU layer to prevent repaint on scroll */
        transform: translateZ(0); 
        backface-visibility: hidden;
      }

      /* 3D Book Animation utilities */
      .backface-hidden {
        backface-visibility: hidden;
        -webkit-backface-visibility: hidden;
      }
      .preserve-3d {
        transform-style: preserve-3d;
        -webkit-transform-style: preserve-3d;
      }


      .no-scrollbar::-webkit-scrollbar {
          display: none;
      }
      .no-scrollbar {
          -ms-overflow-style: none;
          scrollbar-width: none;
      }

      /* LIQUID GLASS STYLE - LIGHT */
      .liquid-glass {
        background: linear-gradient(145deg, rgba(255, 255, 255, 0.5) 0%, rgba(255, 255, 255, 0.1) 100%);
        backdrop-filter: blur(12px) saturate(110%); 
        -webkit-backdrop-filter: blur(12px) saturate(110%);
        border: 1px solid rgba(255, 255, 255, 0.4);
        box-shadow: 
          0 10px 40px rgba(0, 0, 0, 0.05),
          inset 0 0 0 1px rgba(255, 255, 255, 0.3),
          inset 0 2px 10px rgba(255, 255, 255, 0.5); 
        /* Optimization */
        transform: translateZ(0);
      }
      
      /* LIQUID GLASS STYLE - DARK (For Hero/Black Sections) */
      .liquid-glass-dark {
        background: linear-gradient(145deg, rgba(30, 30, 30, 0.6) 0%, rgba(0, 0, 0, 0.2) 100%);
        backdrop-filter: blur(12px) saturate(110%); 
        -webkit-backdrop-filter: blur(12px) saturate(110%);
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: 
          0 10px 40px rgba(0, 0, 0, 0.3),
          inset 0 0 0 1px rgba(255, 255, 255, 0.1),
          inset 0 2px 10px rgba(255, 255, 255, 0.05); 
         /* Optimization */
         transform: translateZ(0);
      }
      
      /* Hover state for interactive liquid elements */
      .liquid-glass-interactive:hover {
        background: linear-gradient(145deg, rgba(255, 255, 255, 0.6) 0%, rgba(255, 255, 255, 0.2) 100%);
        box-shadow: 
          0 15px 50px rgba(0, 0, 0, 0.1),
          inset 0 0 0 1px rgba(255, 255, 255, 0.4),
          inset 0 2px 20px rgba(255, 255, 255, 0.8);
        transform: translateY(-2px);
      }
    </style>
<script type="importmap">
{
  "imports": {

</script>
</head>

    <div id="root"></div>
    <div class="texture-overlay"></div>
